<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破晓</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background: rgba(7,5,3,1);
            transition: background 2.5s ease;
            min-height: 100vh;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'ZCOOL XiaoWei', serif;
            padding: 0 20px 40px;
            background: transparent;
        }

        #po-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3.5rem;
            letter-spacing: 1.2rem;
            color: #c9a84c;
            text-shadow: 0 0 40px rgba(201,168,76,1), 0 0 80px rgba(201,168,76,0.5);
            margin: 2rem 0 0.4rem;
        }

        #po-sub {
            color: rgba(201,168,76,0.55);
            font-size: 0.9rem;
            letter-spacing: 0.6rem;
            margin-bottom: 1rem;
        }

        #po-crack {
            width: 100%;
            max-width: 800px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.6rem;
        }
        #po-crack::before {
            content: '';
            display: block;
            width: 65%;
            height: 3px;
            background: linear-gradient(to right, transparent, #a07830, #fff8d0, #ffe89a, #fff8d0, #a07830, transparent);
            box-shadow: 0 0 8px #c9a84c, 0 0 25px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.3);
            border-radius: 2px;
            transition: box-shadow 2s ease;
        }
        #po-crack.no-glow::before {
            box-shadow: none;
        }

        #po-progress {
            color: rgba(201,168,76,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.4rem;
            margin-bottom: 1.2rem;
        }

        #progress-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 1.4rem;
        }

        .prog-btn {
            background: transparent;
            border: 1px solid rgba(201,168,76,0.35);
            color: rgba(201,168,76,0.6);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.85rem;
            letter-spacing: 0.1rem;
            padding: 5px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .prog-btn:hover {
            border-color: #c9a84c;
            color: #c9a84c;
            box-shadow: 0 0 10px rgba(201,168,76,0.25);
        }
        .prog-btn.active {
            background: rgba(201,168,76,0.12);
            border-color: #c9a84c;
            color: #c9a84c;
            box-shadow: 0 0 14px rgba(201,168,76,0.35);
        }

        #chat-box {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 16px;
            border: 1px solid rgba(201,168,76,0.2);
            display: flex;
            flex-direction: column;
            height: 420px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

        .msg-bot {
            align-self: flex-start;
            max-width: 80%;
            background: #f5f0e8;
            border-radius: 4px 18px 18px 18px;
            padding: 12px 16px;
            color: #2a1f0a;
            font-size: 0.95rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .msg-user {
            align-self: flex-end;
            max-width: 80%;
            background: #2a1f08;
            border-radius: 18px 18px 4px 18px;
            padding: 12px 16px;
            color: #e8d5a3;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        #input-area {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
        }

        #msg-input {
            flex: 1;
            background: rgba(7,5,3,0.72);
            border: 1px solid rgba(201,168,76,0.35);
            color: #e8d5a3;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.95rem;
            border-radius: 16px;
            padding: 12px 18px;
            resize: none;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        #msg-input::placeholder { color: rgba(201,168,76,0.3); }
        #msg-input:focus {
            border-color: #c9a84c;
            box-shadow: 0 0 14px rgba(201,168,76,0.22);
        }

        #send-btn {
            background: linear-gradient(135deg, #1e1508, #332208);
            border: 1px solid rgba(201,168,76,0.6);
            color: #c9a84c;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1rem;
            letter-spacing: 0.3rem;
            border-radius: 16px;
            padding: 12px 26px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        #send-btn:hover {
            background: linear-gradient(135deg, #332208, #4a3010);
            box-shadow: 0 0 20px rgba(201,168,76,0.4);
            color: #f0d080;
        }
    </style>
</head>
<body>

    <div id="po-title">破 晓</div>
    <div id="po-sub">不为世人限 · 剑指破晓途</div>
    <div id="po-crack"></div>
    <div id="po-progress">· 旅途进度 &nbsp; 0 % &nbsp;·&nbsp; 混沌初开</div>

    <div id="progress-bar">
        <button class="prog-btn active" onclick="setProgress('0%', this)">0%</button>
        <button class="prog-btn" onclick="setProgress('25%', this)">25%</button>
        <button class="prog-btn" onclick="setProgress('50%', this)">50%</button>
        <button class="prog-btn" onclick="setProgress('75%', this)">75%</button>
        <button class="prog-btn" onclick="setProgress('100%', this)">100%</button>
    </div>

    <div id="chat-box">
        <div id="chat-messages">
            <div class="msg-bot">前行者，欢迎来到破晓。

敢直面内心、走到这里，你本身就是勇士。

那些卡在转行路口、求职路上，让你辗转反侧的执念与困境，在这里放心说出来，我陪你一起面对，破开长夜、共赴曙光。</div>
        </div>
    </div>

    <div id="input-area">
        <textarea id="msg-input" rows="1" placeholder="在此倾诉心声，按 Enter 发送..."></textarea>
        <button id="send-btn" onclick="sendMessage()">发 送</button>
    </div>

    <script>
        const STAGES = {
            '0%':   { bg: '#070503', label: '· 旅途进度 &nbsp; 0 % &nbsp;·&nbsp; 混沌初开',   dark: false, glow: true  },
            '25%':  { bg: '#1c1508', label: '· 旅途进度 &nbsp; 25 % &nbsp;·&nbsp; 破冰之始',  dark: false, glow: false },
            '50%':  { bg: '#3d2d0e', label: '· 旅途进度 &nbsp; 50 % &nbsp;·&nbsp; 曙光乍现',  dark: false, glow: false },
            '75%':  { bg: '#c4a448', label: '· 旅途进度 &nbsp; 75 % &nbsp;·&nbsp; 黎明将至',  dark: true,  glow: false },
            '100%': { bg: '#f8f5ee', label: '· 旅途进度 &nbsp; 100 % &nbsp;·&nbsp; 破晓而出', dark: true,  glow: false },
        };

        function setProgress(p, btn) {
            const s = STAGES[p];
            document.documentElement.style.background = s.bg;

            const title = document.getElementById('po-title');
            const sub   = document.getElementById('po-sub');
            const prog  = document.getElementById('po-progress');
            const crack = document.getElementById('po-crack');

            if (s.dark) {
                title.style.color = '#2a1505';
                title.style.textShadow = 'none';
                sub.style.color   = 'rgba(60,35,8,0.6)';
                prog.style.color  = 'rgba(60,35,8,0.5)';
            } else {
                title.style.color = '#c9a84c';
                title.style.textShadow = s.glow
                    ? '0 0 40px rgba(201,168,76,1), 0 0 80px rgba(201,168,76,0.5)'
                    : 'none';
                sub.style.color  = 'rgba(201,168,76,0.55)';
                prog.style.color = 'rgba(201,168,76,0.5)';
            }

            prog.innerHTML = s.label;
            crack.className = s.glow ? '' : 'no-glow';

            document.querySelectorAll('.prog-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // ── 对话历史（含页面初始开场白）────────────────────────
        const history = [
            {
                role: "assistant",
                content: "前行者，欢迎来到破晓。\n\n敢直面内心、走到这里，你本身就是勇士。\n\n那些卡在转行路口、求职路上，让你辗转反侧的执念与困境，在这里放心说出来，我陪你一起面对，破开长夜、共赴曙光。"
            }
        ];
        let isSending = false;

        document.getElementById('msg-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function appendMsg(cls, text) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = cls;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || isSending) return;
            isSending = true;

            appendMsg('msg-user', text);
            input.value = '';
            history.push({ role: "user", content: text });

            const loading = appendMsg('msg-bot', '思索中……');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history }),
                });

                if (!res.ok) throw new Error('服务器错误 ' + res.status);
                const data = await res.json();

                loading.textContent = data.reply;
                history.push({ role: "assistant", content: data.reply });

                if (data.stage_complete) {
                    setTimeout(() => {
                        const btn25 = document.querySelectorAll('.prog-btn')[1];
                        if (btn25) setProgress('25%', btn25);
                    }, 1200);
                }
            } catch (err) {
                loading.textContent = '连接失败，请确认 app.py 已启动。（' + err.message + '）';
            }

            isSending = false;
            document.getElementById('chat-messages').scrollTop = 9999;
        }
    </script>
</body>
</html>
